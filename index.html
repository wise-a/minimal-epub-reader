<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPUB Reader</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --ui-bg: #f9f9f9;
      --border-color: #eaeaea;
      --button-bg: #333333;
      --button-text: #ffffff;
      --button-hover-bg: #555555;
      --accent-color: #007bff;
      --error-color: #dc3545;
    }

    [data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --ui-bg: #1e1e1e;
      --border-color: #333333;
      --button-bg: #333333;
      --button-text: #e0e0e0;
      --button-hover-bg: #444444;
      --accent-color: #4da3ff;
      --error-color: #ff6b6b;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Controls container (Top) */
    #controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background-color: var(--bg-color);
      flex-wrap: wrap;
      gap: 1rem;
    }

    #fileInput {
      font-size: 0.9rem;
      color: var(--text-color);
      cursor: pointer;
    }

    input[type="file"]::file-selector-button {
      border: 1px solid var(--border-color);
      padding: 0.4em 0.8em;
      border-radius: 0.2em;
      background-color: var(--ui-bg);
      color: var(--text-color);
      transition: 0.2s;
      cursor: pointer;
    }

    input[type="file"]::file-selector-button:hover {
      background-color: var(--button-hover-bg);
      color: var(--button-text);
    }

    .controls-right {
      display: flex;
      gap: 0.5rem;
    }

    .control-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 0.4rem 0.8rem;
      border-radius: 0.2rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .control-btn:hover:not(:disabled) {
      background-color: var(--ui-bg);
    }
    
    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #viewer {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #book-container {
      flex: 1;
      overflow: hidden; 
      background-color: var(--bg-color);
    }

    /* Navigation (Bottom) */
    #navigation {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem;
      background-color: var(--bg-color);
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-color);
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s ease;
      padding: 0.5rem;
    }

    .nav-btn:hover {
      opacity: 1;
    }

    #page-info {
      font-size: 0.9rem;
      opacity: 0.8;
      min-width: 180px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s ease;
    }

    #page-info:hover {
      opacity: 1;
    }

    #progress-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background-color: transparent;
      pointer-events: none;
    }

    #progress-bar {
      height: 100%;
      width: 0;
      background-color: var(--accent-color);
      transition: width 0.2s ease;
    }

    .error-message {
      color: var(--error-color);
      text-align: center;
      padding: 1rem;
      width: 100%;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.88/dist/epub.min.js"></script>
</head>

<body>

  <div id="controls">
    <input type="file" id="fileInput" accept=".epub" />
    <div class="controls-right">
      <button id="export-btn" class="control-btn" disabled>Export Location</button>
      <button id="theme-toggle" class="control-btn">Dark Mode</button>
    </div>
  </div>

  <div id="viewer">
    <div id="book-container"></div>
  </div>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="navigation">
    <button id="prev-btn" class="nav-btn" title="Previous Page">←</button>
    <span id="page-info"></span>
    <button id="next-btn" class="nav-btn" title="Next Page">→</button>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('fileInput');
      const viewer = document.getElementById('book-container');
      const prevButton = document.getElementById('prev-btn');
      const nextButton = document.getElementById('next-btn');
      const progressBar = document.getElementById('progress-bar');
      const themeToggle = document.getElementById('theme-toggle');
      const exportBtn = document.getElementById('export-btn');
      const pageInfo = document.getElementById('page-info');

      let book;
      let rendition;
      let currentBookKey = '';
      let currentCfi = '';
      let displayMode = parseInt(localStorage.getItem('epub-display-mode') || '0', 10);

      // Theme handling
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        themeToggle.textContent = 'Light Mode';
      }

      themeToggle.addEventListener('click', () => {
        if (document.body.getAttribute('data-theme') === 'dark') {
          document.body.removeAttribute('data-theme');
          themeToggle.textContent = 'Dark Mode';
          localStorage.setItem('theme', 'light');
        } else {
          document.body.setAttribute('data-theme', 'dark');
          themeToggle.textContent = 'Light Mode';
          localStorage.setItem('theme', 'dark');
        }
        if (rendition) {
          updateBookTheme();
        }
      });

      function updateBookTheme() {
        if (!rendition) return;
        const computedStyle = getComputedStyle(document.body);
        const textColor = computedStyle.getPropertyValue('--text-color').trim();
        const bgColor = computedStyle.getPropertyValue('--bg-color').trim();

        rendition.themes.default({
          body: { color: textColor, background: bgColor },
          p: { color: textColor },
          h1: { color: textColor },
          h2: { color: textColor },
          h3: { color: textColor },
          h4: { color: textColor },
          h5: { color: textColor },
          h6: { color: textColor },
          span: { color: textColor },
          div: { color: textColor }
        });
      }

      pageInfo.addEventListener('click', () => {
        displayMode = (displayMode + 1) % 3;
        localStorage.setItem('epub-display-mode', displayMode);
        if (rendition && book && book.locations.length() > 0) {
           updateProgress(rendition.currentLocation());
        }
      });

      function updateProgress(locationObj) {
        if (!book || !book.locations) return;

        // Safely determine total pages without crashing
        let totalPages = book.locations.total || 0;
        if (!totalPages && typeof book.locations.length === 'function') {
           try { totalPages = book.locations.length(); } catch(e) {}
        }
        if (!totalPages && book.locations._locations) {
           totalPages = book.locations._locations.length;
        }

        if (totalPages === 0) {
           pageInfo.textContent = 'Calculating...';
           return;
        }

        // Use active location or fallback to saved CFI
        if (!locationObj && rendition) {
           locationObj = rendition.currentLocation();
        }
        if (!locationObj && currentCfi) {
           locationObj = { start: { cfi: currentCfi } };
        }

        let percentage = 0;
        let currentPage = 1;

        if (locationObj && locationObj.start) {
            if (locationObj.start.location && locationObj.start.location > 0) {
                // Priority 1: Exact integer location is cleanly provided
                currentPage = locationObj.start.location;
                percentage = locationObj.start.percentage || (currentPage / totalPages);
            } else if (locationObj.start.cfi) {
                // Priority 2: Safely parse from CFI
                percentage = book.locations.percentageFromCfi(locationObj.start.cfi);
                if (percentage === null || percentage === undefined || percentage < 0) {
                    percentage = 0;
                }
                
                currentPage = book.locations.locationFromCfi(locationObj.start.cfi);
                if (!currentPage || currentPage < 1) {
                    currentPage = Math.max(1, Math.round(percentage * totalPages));
                }
            }
        }

        // Clamp the values to valid bounds so the UI stays stable
        percentage = Math.max(0, Math.min(1, percentage));
        currentPage = Math.max(1, Math.min(totalPages, currentPage));

        progressBar.style.width = `${percentage * 100}%`;
        
        let chapterCurrent = 1;
        let chapterTotal = 1;
        if (locationObj && locationObj.start && locationObj.start.displayed) {
            chapterCurrent = locationObj.start.displayed.page;
            chapterTotal = locationObj.start.displayed.total;
        }
        
        const percentDisplay = Math.round(percentage * 100);
        
        if (displayMode === 0) {
            pageInfo.textContent = `Location: ${currentPage} out of ${totalPages}`;
        } else if (displayMode === 1) {
            pageInfo.textContent = `Location: ${percentDisplay}%`;
        } else {
            pageInfo.textContent = `Location: ${chapterCurrent} of Chapter ${chapterTotal}`;
        }
      }

      // Setup navigation listeners for main document
      prevButton.addEventListener('click', () => {
          if (rendition) rendition.prev();
      });
      nextButton.addEventListener('click', () => {
          if (rendition) rendition.next();
      });

      document.addEventListener('keydown', (e) => {
          if (!rendition) return;
          if (e.key === 'ArrowRight') rendition.next();
          if (e.key === 'ArrowLeft') rendition.prev();
      });

      // Handle location export
      exportBtn.addEventListener('click', () => {
        if (!currentCfi || !currentBookKey) return;
        
        const data = {
          bookId: currentBookKey,
          cfi: currentCfi,
          exportedAt: new Date().toISOString()
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `epub-location-${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      if (typeof ePub !== 'function') {
        viewer.innerHTML = '<p class="error-message">Error: ePub.js library failed to load.</p>';
        return;
      }

      fileInput.addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;

        // Cleanup
        if (book) {
            book.destroy();
        }
        viewer.innerHTML = '';
        progressBar.style.width = '0%';
        pageInfo.textContent = '';
        exportBtn.disabled = false;

        // Establish a unique key for the book so we can save its location
        currentBookKey = `epub-loc-${file.name}-${file.size}`;
        const savedCfi = localStorage.getItem(currentBookKey);

        try {
          book = ePub(file);
          rendition = book.renderTo(viewer, {
            width: '100%',
            height: '100%',
            allowScriptedContent: false 
          });

          // Restore saved location if it exists, otherwise just display
          if (savedCfi) {
             rendition.display(savedCfi);
          } else {
             rendition.display();
          }

          // Setup arrow key navigation inside the iframe
          rendition.on('keyup', (e) => {
            if (e.key === 'ArrowRight') rendition.next();
            if (e.key === 'ArrowLeft') rendition.prev();
          });

          rendition.hooks.content.register((contents) => {
             updateBookTheme();
          });

          rendition.on('rendered', () => {
              updateBookTheme();
          });

          // Sync location whenever the user changes the page
          rendition.on('relocated', (location) => {
             if (location && location.start) {
                 currentCfi = location.start.cfi;
                 localStorage.setItem(currentBookKey, currentCfi);
                 updateProgress(location);
             }
          });

          // Background task: Generate or load locations to track page numbers accurately
          book.ready.then(() => {
            const locationsKey = currentBookKey + '-locations';
            const storedLocations = localStorage.getItem(locationsKey);
            
            if (storedLocations) {
              book.locations.load(storedLocations);
              updateProgress(rendition.currentLocation());
            } else {
              // Generate locations (1024 chars per "page") and cache them
              return book.locations.generate(1024).then(() => {
                 localStorage.setItem(locationsKey, book.locations.save());
                 updateProgress(rendition.currentLocation());
              });
            }
          }).catch(err => {
             console.error("Failed to process locations:", err);
             pageInfo.textContent = '';
          });

        } catch (err) {
          viewer.innerHTML = `<p class="error-message">Failed to load EPUB: ${err.message}</p>`;
        }
      });
    });
  </script>
</body>

</html>
